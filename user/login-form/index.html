        /* Check-in Lottie animations */
        @keyframes ciGlowRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes ciCalendarShake {
            0%, 100% { transform: rotate(0deg); }
            15% { transform: rotate(-15deg); }
            30% { transform: rotate(15deg); }
            45% { transform: rotate(-10deg); }
            55% { transform: rotate(0deg); }
        }
        @keyframes ciCheckDraw {
            0% { clip-path: inset(0 100% 0 0); opacity: 0; }
            30% { opacity: 1; }
            100% { clip-path: inset(0 0% 0 0); opacity: 1; }
        }
        @keyframes ciCoin1 {
            0% { transform: translate(250px,250px) scale(1); opacity: 0; }
            15% { opacity: 1; }
            70% { transform: translate(430px,60px) scale(1.3); opacity: 1; }
            100% { transform: translate(460px,30px) scale(1.2); opacity: 0; }
        }
        @keyframes ciCoin2 {
            0% { transform: translate(250px,250px) scale(1); opacity: 0; }
            15% { opacity: 1; }
            70% { transform: translate(30px,430px) scale(1.3); opacity: 1; }
            100% { transform: translate(0px,460px) scale(1.2); opacity: 0; }
        }
        @keyframes ciCoin3 {
            0% { transform: translate(250px,250px) scale(1); opacity: 0; }
            15% { opacity: 1; }
            70% { transform: translate(430px,430px) scale(1.3); opacity: 1; }
            100% { transform: translate(460px,460px) scale(1.2); opacity: 0; }
        }
        @keyframes ciCoin4 {
            0% { transform: translate(250px,250px) scale(1); opacity: 0; }
            15% { opacity: 1; }
            70% { transform: translate(30px,60px) scale(1.3); opacity: 1; }
            100% { transform: translate(0px,30px) scale(1.2); opacity: 0; }
        }
        @keyframes ciGlowPulse {
            0%, 100% { transform: scale(0.96); opacity: 0.7; }
            50% { transform: scale(1.05); opacity: 1; }
        }
        @keyframes ciDecoBounce {
            0%, 100% { transform: translate(463.5px,411.5px) scale(1); }
            50% { transform: translate(463.5px,400px) scale(1.05); }
        }
        .ci-glow { animation: ciGlowRotate 8s linear infinite; }
        .ci-calendar { animation: ciCalendarShake 2.5s ease-in-out infinite; }
        .ci-checkmark { animation: ciCheckDraw 1.5s ease-out infinite; animation-delay: 0.8s; opacity: 0; }
        .ci-coin1 { animation: ciCoin1 3s ease-out infinite; }
        .ci-coin2 { animation: ciCoin2 3s ease-out infinite; animation-delay: 0.4s; }
        .ci-coin3 { animation: ciCoin3 3s ease-out infinite; animation-delay: 0.8s; }
        .ci-coin4 { animation: ciCoin4 3s ease-out infinite; animation-delay: 1.2s; }
        .ci-glow-circle { animation: ciGlowPulse 2s ease-in-out infinite; }
        .ci-deco { animation: ciDecoBounce 2s ease-in-out infinite; }

  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const otpBtn = document.getElementById('otpBtn');
    const pwdBtn = document.getElementById('pwdBtn');
    const otpSection = document.getElementById('otpSection');
    const pwdSection = document.getElementById('pwdSection');
    const rememberSection = document.getElementById('rememberSection');
    const phoneInput = document.getElementById('phoneInput');
    const passwordInput = document.getElementById('passwordInput');
    const otpInput = document.getElementById('otpInput');
    const getOtpBtn = document.getElementById('getOtpBtn');
    const signInBtn = document.getElementById('signInBtn');
    const togglePassword = document.getElementById('togglePassword');
    const eyeOff = document.getElementById('eyeOff');
    const eyeOn = document.getElementById('eyeOn');

    let mode = 'otp';

    const isValidPhone = (num) => num === 'admin' || /^[6-9]\d{9}$/.test(num);

    function validateButtons() {
      const phone = phoneInput.value.trim();
      const pw = passwordInput.value;
      if (phone === 'admin' && pw === '1234') {
        signInBtn.disabled = false;
      } else if (mode === 'password') {
        signInBtn.disabled = !(isValidPhone(phone) && pw.length >= 6);
      } else {
        signInBtn.disabled = !(isValidPhone(phone) && otpInput.value.length === 6);
        getOtpBtn.classList.toggle('pointer-events-none', !isValidPhone(phone));
        getOtpBtn.classList.toggle('opacity-50', !isValidPhone(phone));
      }
      signInBtn.classList.toggle('opacity-30', signInBtn.disabled);
    }

    function switchToOTP() {
      mode = 'otp';
      otpSection.style.display = 'block';
      pwdSection.style.display = 'none';
      rememberSection.style.display = 'none';
      otpBtn.dataset.selected = 'true';
       otpBtn.classList.add('tab-active');
  otpBtn.classList.remove('tab-inactive');
  pwdBtn.classList.remove('tab-active');
  pwdBtn.classList.add('tab-inactive');
      delete pwdBtn.dataset.selected;
      
    }

    function switchToPassword() {
      mode = 'password';
      otpSection.style.display = 'none';
      pwdSection.style.display = 'block';
      rememberSection.style.display = 'flex';
      pwdBtn.dataset.selected = 'true';
       pwdBtn.classList.add('tab-active');
  pwdBtn.classList.remove('tab-inactive');
  otpBtn.classList.remove('tab-active');
  otpBtn.classList.add('tab-inactive');
      delete otpBtn.dataset.selected;
      
    }

    otpBtn.addEventListener('click', switchToOTP);
    pwdBtn.addEventListener('click', switchToPassword);
    [phoneInput, passwordInput, otpInput].forEach(el => el.addEventListener('input', validateButtons));

    
    getOtpBtn.addEventListener('click', () => {
  if (!isValidPhone(phoneInput.value)) return;

  getOtpBtn.textContent = 'Sending...';
  getOtpBtn.classList.add('pointer-events-none', 'opacity-50');

  fetch("/user/send-otp", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "X-CSRF-TOKEN": "Tqm5uNb1VpWm0RgqXObcWw3bwKiq8YXOg9oL3w1Z"
    },
    body: JSON.stringify({ mobile: phoneInput.value })
  })
  .then(async res => {
    const data = await res.json().catch(() => ({})); // Safe JSON parse
    if (!res.ok) throw new Error(data.message || 'Request failed');
    return data;
  })
  .then(data => {
    alert(data.message || 'OTP sent successfully!');
    let countdown = 60;
    getOtpBtn.textContent = countdown + 's';
    const timer = setInterval(() => {
      countdown--;
      getOtpBtn.textContent = countdown + 's';
      if (countdown <= 0) {
        clearInterval(timer);
        getOtpBtn.textContent = 'GET OTP';
        
      }
    }, 1000);
  })
  .catch(err => {
    alert(err.message || 'Error sending OTP.');
    getOtpBtn.textContent = 'GET OTP';
    getOtpBtn.classList.remove('pointer-events-none', 'opacity-50');
  });
});

   
    togglePassword.addEventListener('click', () => {
      const type = passwordInput.type === 'password' ? 'text' : 'password';
      passwordInput.type = type;
      eyeOff.style.display = type === 'password' ? 'block' : 'none';
      eyeOn.style.display = type === 'password' ? 'none' : 'block';
    });
  });
  
  </script>
