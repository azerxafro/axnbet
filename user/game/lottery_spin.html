<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="/currency.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lucky Spin - AXN</title>
  <link rel="stylesheet" href="../../dd.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    body {
      background-image: url('/back.webp');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      font-family: 'Poppins', sans-serif;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 24px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    }
    .wheel-container {
      position: relative;
      width: 320px;
      height: 320px;
      margin: 20px auto;
    }
    .wheel-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transition: transform 4s cubic-bezier(0.1, 0.8, 0.2, 1);
      transform: rotate(0deg);
    }
    .pointer-img {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -60%);
      width: 70px;
      height: 78px;
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>
<body class="min-h-screen text-main pb-24 flex flex-col">
  
  <!-- Header -->
  <div class="flex items-center justify-between p-4 bg-white/20 backdrop-blur-md border-b border-white/10 sticky top-0 z-50">
    <button onclick="window.location.href='/'" class="p-2 text-white font-black text-sm flex items-center gap-1">❮ Back</button>
    <h1 class="font-extrabold text-lg text-white">Lucky Spin</h1>
    <select id="currencySelector" onchange="changeCurrency(this.value)" class="bg-white/20 text-white border border-none text-xs rounded-sm h-8 px-2 font-bold focus:outline-none shadow-sm cursor-pointer hover:bg-white/30 transition-all">
        <option value="INR" class="text-black">INR (₹)</option>
        <option value="USD" class="text-black">USD ($)</option>
        <option value="CAD" class="text-black">CAD (C$)</option>
        <option value="SGD" class="text-black">SGD (S$)</option>
        <option value="AED" class="text-black">AED (AED)</option>
    </select>
  </div>

  <div class="flex-1 p-5 flex flex-col items-center justify-center max-w-md mx-auto w-full">
    
    <!-- Balance Card -->
    <div class="glass-card p-4 w-full text-center text-white mb-6">
      <span class="text-xs text-white/70 font-semibold uppercase tracking-wider">Your Balance</span>
      <h2 id="spinBalance" class="text-3xl font-black mt-1">₹0.00</h2>
    </div>

    <!-- Spin Wheel -->
    <div class="wheel-container">
      <!-- Pointer -->
      <img class="pointer-img" src="/assets/bz/images/home/lottie/lucky-spin/img_2.png" alt="Pointer" />
      <!-- Wheel -->
      <img id="spinWheel" class="wheel-img" src="/assets/bz/images/home/lottie/lucky-spin/img_4.png" alt="Wheel" />
    </div>

    <!-- Spin Button -->
    <button id="spinBtn" onclick="runSpin()" class="w-full py-4 mt-6 rounded-full text-white font-extrabold text-lg bg-gradient-to-r from-pink-500 to-purple-600 shadow-lg hover:opacity-90 active:scale-[0.98] transition-all">
      SPIN NOW (Cost: ₹50)
    </button>

    <!-- Prizes Legend or Spin History -->
    <div class="glass-card p-4 w-full text-white mt-6">
      <span class="text-xs text-white/70 font-bold uppercase tracking-wider block mb-3">Spin History</span>
      <div id="spinHistory" class="flex flex-col gap-2 max-h-40 overflow-y-auto">
        <div class="text-white/50 text-sm text-center py-4">No spins played yet. Spin the wheel to win!</div>
      </div>
    </div>

  </div>

  <script>
    let isSpinning = false;
    let currentRotation = 0;

    // Load initial user balance
    function loadBalance() {
      if (window.userSession) {
        document.getElementById('spinBalance').textContent = '₹' + window.userSession.balance.toFixed(2);
      }
    }
    loadBalance();

    function runSpin() {
      if (isSpinning) return;
      
      const btn = document.getElementById('spinBtn');
      btn.disabled = true;
      btn.style.opacity = '0.5';
      isSpinning = true;

      fetch('/api/game/spin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' }
      })
      .then(res => {
        if (res.status === 401) {
          Swal.fire('Sign In Required', 'Please sign in first to play Lucky Spin.', 'warning')
          .then(() => { window.location.href = '/user/login-form'; });
          throw new Error('Unauthorized');
        }
        if (!res.ok) {
          return res.json().then(err => {
            Swal.fire('Error', err.message || 'Failed to spin.', 'error');
            throw new Error(err.message);
          });
        }
        return res.json();
      })
      .then(data => {
        const { prize, new_balance } = data;
        
        // Update userSession global balance
        if (window.userSession) {
          window.userSession.balance = new_balance;
        }

        // Calculate rotation target
        // Wheel segments:
        // Index 0: ₹10
        // Index 1: ₹50
        // Index 2: ₹100
        // Index 3: ₹500
        // Index 4: ₹1000
        // Index 5: Try Again
        // Index 6: ₹25
        // Index 7: ₹75
        // Angle offsets:
        // Sector width = 360 / 8 = 45 degrees
        // Target angle lands in center of winning sector
        // Segment indexes are clockwise on the wheel, but wheel rotates counter-clockwise.
        const sectorWidth = 45;
        const targetSectorAngle = prize.index * sectorWidth;
        
        // Let's add 5 full spins (1800 deg) for visual excitement!
        const totalSpins = 5;
        const finalAngle = (totalSpins * 360) - targetSectorAngle;
        
        currentRotation = finalAngle;
        
        const wheel = document.getElementById('spinWheel');
        wheel.style.transform = `rotate(${currentRotation}deg)`;

        setTimeout(() => {
          // Play win sound (mock/beep)
          if (typeof AudioContext !== 'undefined') {
            try {
              const audioCtx = new (AudioContext || webkitAudioContext)();
              const osc = audioCtx.createOscillator();
              const gainNode = audioCtx.createGain();
              osc.connect(gainNode);
              gainNode.connect(audioCtx.destination);
              osc.frequency.setValueAtTime(440, audioCtx.currentTime); // A4
              gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
              osc.start();
              osc.stop(audioCtx.currentTime + 0.3);
            } catch (soundErr) {
              console.log("Audio contexts blocked or not supported yet.");
            }
          }

          // Show win popup
          if (prize.value > 0) {
            Swal.fire({
              title: 'Congratulations! 🎉',
              text: `You won ${prize.label}!`,
              icon: 'success',
              confirmButtonColor: '#ff007f'
            });
            appendHistory(prize.label, 'win');
          } else {
            Swal.fire({
              title: 'Try Again! 🍀',
              text: 'Better luck next time!',
              icon: 'info',
              confirmButtonColor: '#7c3aed'
            });
            appendHistory('Try Again', 'lose');
          }

          // Update balance display
          document.getElementById('spinBalance').textContent = '₹' + new_balance.toFixed(2);
          
          isSpinning = false;
          btn.disabled = false;
          btn.style.opacity = '1';
        }, 4100);
      })
      .catch(err => {
        isSpinning = false;
        btn.disabled = false;
        btn.style.opacity = '1';
        console.error(err);
      });
    }

    function appendHistory(label, type) {
      const historyList = document.getElementById('spinHistory');
      
      // Remove placeholder
      if (historyList.innerHTML.includes('No spins played yet')) {
        historyList.innerHTML = '';
      }

      const item = document.createElement('div');
      item.className = 'flex justify-between items-center py-2 px-3 bg-white/5 rounded-lg border border-white/5';
      const color = type === 'win' ? 'text-green-400' : 'text-gray-400';
      item.innerHTML = `
        <span class="text-sm font-semibold">${label}</span>
        <span class="text-xs ${color} font-bold capitalize">${type === 'win' ? '+ Won' : 'No Prize'}</span>
      `;
      historyList.prepend(item);
    }
  </script>
</body>
</html>
